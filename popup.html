<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100%;
      min-height: 420px;
      padding: 16px 18px 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #ffffff;
    }

    .window-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 8px 10px;
      margin-bottom: 8px;
      border-bottom: 1px solid #2b2b2b;
      cursor: move;
      user-select: none;
      font-size: 13px;
      font-weight: 600;
      color: #ddd;
    }
    
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
      letter-spacing: -0.5px;
    }
    
    #status {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
      min-height: 20px;
    }
    
    #status.recording {
      color: #ff4444;
      font-weight: 500;
    }
    
    #timer {
      text-align: center;
      font-size: 28px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      margin-bottom: 20px;
      color: #eee;
      min-height: 40px;
    }
    
    #btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: #4a6cf7;
      color: white;
      margin-bottom: 8px;
    }

    #btn.secondary {
      background: #2f3f66;
    }
    
    #btn:hover {
      background: #5a7cf7;
      transform: scale(1.02);
    }
    
    #btn:active {
      transform: scale(0.98);
    }
    
    #btn.recording {
      background: #ff4444;
    }
    
    #btn.recording:hover {
      background: #ff5555;
    }
    
    #btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    #reset-btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      background: #333;
      color: #888;
      margin-top: 4px;
    }

    .settings {
      margin-bottom: 12px;
      display: grid;
      gap: 8px;
      font-size: 12px;
      color: #ccc;
    }

    .settings label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .settings select {
      flex: 1;
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
    }
    
    #reset-btn:hover {
      background: #444;
      color: #fff;
    }
    
    .hint {
      text-align: center;
      font-size: 11px;
      color: #555;
      margin-top: 12px;
      line-height: 1.5;
    }
    
    .hint kbd {
      background: #333;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="window-header" id="drag-handle">🎬 Screen Recorder</div>
  <h1>🎬 Screen Recorder</h1>
  
  <div id="status">Ready</div>
  <div id="timer">00:00</div>

  <div class="settings">
    <label>
      Format
      <select id="format-select">
        <option value="webm">WebM</option>
        <option value="mp4">MP4</option>
      </select>
    </label>
    <label>
      Quality
      <select id="quality-select">
        <option value="high">High</option>
        <option value="medium" selected>Medium</option>
        <option value="low">Low</option>
      </select>
    </label>
    <label>
      FPS
      <select id="fps-select">
        <option value="30" selected>30</option>
        <option value="60">60</option>
        <option value="120">120</option>
      </select>
    </label>
  </div>
  
  <button id="btn">Start Recording</button>
  <button id="reset-btn">🔄 Reset (if stuck)</button>
  
  <div class="hint">
    💡 录制中可关闭 popup，随后再次打开继续控制<br>
    Press <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>R</kbd> to stop
  </div>

  <script src="popup.js"></script>
</body>
</html>
